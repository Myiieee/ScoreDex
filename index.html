<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScoreFlex - Customizable Scoreboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <section id="setup-page" class="card">
            <h1>ScoreFlex Setup</h1>
            <hr>
            <div class="form-group">
                <label for="team-count">Number of Teams:</label>
                <input type="number" id="team-count" min="1" max="12" value="2">
            </div>

            <div class="form-group">
                <label for="bonus-value">Bonus Points Value:</label>
                <input type="number" id="bonus-value" value="5">
            </div>

            <div class="form-group toggle-group">
                <label for="infinite-rounds">Infinite Game (No Round Limit):</label>
                <label class="switch">
                    <input type="checkbox" id="infinite-rounds">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="form-group" id="round-limit-group">
                <label for="round-count">Number of Rounds:</label>
                <input type="number" id="round-count" min="1" max="50" value="5">
            </div>

            <div class="form-group toggle-group">
                <label for="allow-negative">Allow Negative Scores:</label>
                <label class="switch">
                    <input type="checkbox" id="allow-negative">
                    <span class="slider"></span>
                </label>
            </div>

            <button id="start-btn" class="btn btn-primary">Start Game</button>
        </section>

        <section id="board-page" class="card hidden">
            <div class="board-header">
                <div>
                    <h2 id="round-title">Round 1</h2>
                </div>
                <button id="exit-btn" class="btn btn-danger">Exit Game</button>
            </div>
            <hr>
            
            <div id="teams-grid" class="grid-container">
                </div>

            <div class="action-control">
                <button id="next-action-btn" class="btn btn-action">End Round & Proceed</button>
            </div>
        </section>

        <section id="results-page" class="card hidden">
            <h1>Game Over</h1>
            <h2 class="winner-banner" id="game-winner">Winner: Team 1!</h2>
            <hr>
            
            <div id="results-content">
                </div>

            <button id="home-btn" class="btn btn-primary" style="margin-top: 25px;">Go Home (Reset)</button>
        </section>
    </div>

    <script>
        // DOM Elements
const setupPage = document.getElementById('setup-page');
const boardPage = document.getElementById('board-page');
const resultsPage = document.getElementById('results-page');

const startBtn = document.getElementById('start-btn');
const exitBtn = document.getElementById('exit-btn');
const nextActionBtn = document.getElementById('next-action-btn');
const homeBtn = document.getElementById('home-btn');

const teamCountInput = document.getElementById('team-count');
const bonusValueInput = document.getElementById('bonus-value');
const infiniteRoundsInput = document.getElementById('infinite-rounds');
const roundCountInput = document.getElementById('round-count');
const allowNegativeInput = document.getElementById('allow-negative');
const roundLimitGroup = document.getElementById('round-limit-group');

const roundTitle = document.getElementById('round-title');
const teamsGrid = document.getElementById('teams-grid');
const gameWinner = document.getElementById('game-winner');
const resultsContent = document.getElementById('results-content');

let gameState = {
    teams: [],
    bonusValue: 5,
    allowNegative: false,
    isInfinite: false,
    totalRounds: 20,
    currentRound: 1,
    history: [],      // Stores only the points scored matching that specific round
    runningTotals: [] // Keeps track of the overall scores displayed on screen
};

// Toggle visibility of round entry field based on infinite checkbox
infiniteRoundsInput.addEventListener('change', (e) => {
    if (e.target.checked) {
        roundLimitGroup.classList.add('hidden');
    } else {
        roundLimitGroup.classList.remove('hidden');
    }
});

// Event Listeners
startBtn.addEventListener('click', startGame);
exitBtn.addEventListener('click', exitGame);
nextActionBtn.addEventListener('click', handleRoundAdvancement);
homeBtn.addEventListener('click', goHome);

function startGame() {
    const teamCount = parseInt(teamCountInput.value) || 2;
    gameState.bonusValue = parseInt(bonusValueInput.value) || 5;
    gameState.allowNegative = allowNegativeInput.checked;
    gameState.isInfinite = infiniteRoundsInput.checked;
    gameState.totalRounds = gameState.isInfinite ? 0 : (parseInt(roundCountInput.value) || 5);
    gameState.currentRound = 1;
    gameState.teams = [];
    gameState.runningTotals = [];
    gameState.history = [];

    for (let i = 1; i <= teamCount; i++) {
        gameState.teams.push({ id: i, name: `Team ${i}` });
        gameState.runningTotals.push(0); // Everyone starts at 0 points
    }

    updateRoundHeader();
    renderScoreboard();
    
    setupPage.classList.add('hidden');
    boardPage.classList.remove('hidden');
}

function updateRoundHeader() {
    if (gameState.isInfinite) {
        roundTitle.textContent = `Round ${gameState.currentRound}`;
        nextActionBtn.textContent = "End Round & Proceed";
    } else {
        roundTitle.textContent = `Round ${gameState.currentRound} / ${gameState.totalRounds}`;
        if (gameState.currentRound === gameState.totalRounds) {
            nextActionBtn.textContent = "End Game & View Results";
            nextActionBtn.style.backgroundColor = "#d9480f"; 
        } else {
            nextActionBtn.textContent = "End Round & Proceed";
            nextActionBtn.style.backgroundColor = "#1098ad";
        }
    }
}

function updateScore(teamIndex, amount) {
    const currentDisplayScore = gameState.runningTotals[teamIndex];
    const newScore = currentDisplayScore + amount;

    if (!gameState.allowNegative && newScore < 0) return; 

    gameState.runningTotals[teamIndex] = newScore;
    document.getElementById(`score-${teamIndex}`).textContent = newScore;
}

function handleRoundAdvancement() {
    // 1. Figure out exactly how many points were earned in THIS specific round
    const roundScoresSnapshot = gameState.runningTotals.map((currentTotal, index) => {
        // Calculate historical points already accounted for in previous rounds
        const totalPointsBeforeThisRound = gameState.history.reduce((sum, pastRound) => sum + pastRound.scores[index], 0);
        // Current Total minus Past Rounds Total = Points gained specifically in this round
        return currentTotal - totalPointsBeforeThisRound;
    });

    // 2. Save just the round's isolated score metrics to history
    gameState.history.push({
        round: gameState.currentRound,
        scores: roundScoresSnapshot
    });

    if (!gameState.isInfinite && gameState.currentRound >= gameState.totalRounds) {
        endGame();
    } else {
        gameState.currentRound++;
        updateRoundHeader();
    }
}

function endGame() {
    boardPage.classList.add('hidden');
    resultsPage.classList.remove('hidden');

    // Find the absolute winner using the final accumulated running totals
    let maxScore = -Infinity;
    let winners = [];
    gameState.teams.forEach((t, index) => {
        const finalScore = gameState.runningTotals[index];
        if (finalScore > maxScore) { 
            maxScore = finalScore; 
            winners = [t.name]; 
        } else if (finalScore === maxScore) { 
            winners.push(t.name); 
        }
    });

    gameWinner.textContent = winners.length > 1 ? `Tie Match: ${winners.join(' & ')}!` : `👑 Winner: ${winners[0]}!`;

    resultsContent.innerHTML = '';

    if (gameState.isInfinite || gameState.history.length === 0) {
        let tableHtml = `<table class="results-table"><thead><tr><th>Team</th><th>Final Score</th></tr></thead><tbody>`;
        gameState.teams.forEach((t, index) => {
            tableHtml += `<tr><td><strong>${t.name}</strong></td><td>${gameState.runningTotals[index]} pts</td></tr>`;
        });
        tableHtml += `</tbody></table>`;
        resultsContent.innerHTML = tableHtml;
    } else {
        // Round-by-Round isolated score matrix table
        let tableHtml = `<table class="results-table"><thead><tr><th>Round No.</th>`;
        gameState.teams.forEach(t => { tableHtml += `<th>${t.name}</th>`; });
        tableHtml += `</tr></thead><tbody>`;

        // Rows showing ONLY what was received per separate round
        gameState.history.forEach(h => {
            tableHtml += `<tr><td><strong>Round ${h.round}</strong></td>`;
            h.scores.forEach(score => { tableHtml += `<td>${score >= 0 ? '+' + score : score}</td>`; });
            tableHtml += `</tr>`;
        });

        // Final Total Row adding everything up at the very bottom
        tableHtml += `<tr class="total-row"><td><strong>Total</strong></td>`;
        gameState.runningTotals.forEach(total => { tableHtml += `<td><strong>${total}</strong></td>`; });
        tableHtml += `</tr></tbody></table>`;

        resultsContent.innerHTML = tableHtml;
    }
}

function exitGame() {
    if (confirm("Quit current game match? Action drops progress metrics permanently.")) {
        // If they exit early, log the current ongoing round metrics before displaying the page
        handleRoundAdvancement();
        endGame();
    }
}

function goHome() {
    resultsPage.classList.add('hidden');
    setupPage.classList.remove('hidden');
}

function renderScoreboard() {
    teamsGrid.innerHTML = '';
    gameState.teams.forEach((team, index) => {
        const teamCard = document.createElement('div');
        teamCard.className = 'team-card';
        teamCard.innerHTML = `
            <h3>${team.name}</h3>
            <div class="score-display" id="score-${index}">${gameState.runningTotals[index]}</div>
            <div class="control-buttons">
                <button class="btn btn-success btn-main" onclick="updateScore(${index}, 1)">+1</button>
                <div class="secondary-buttons">
                    <button class="btn btn-bonus" onclick="updateScore(${index}, ${gameState.bonusValue})">+${gameState.bonusValue} Bonus</button>
                    <button class="btn btn-secondary" onclick="updateScore(${index}, -1)">-1</button>
                </div>
            </div>
        `;
        teamsGrid.appendChild(teamCard);
    });
}
    </script>
</body>
</html>
